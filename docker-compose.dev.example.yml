services:
  postgres:
    image: postgres:16
    container_name: amiya-eden-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_postgres_password
      POSTGRES_DB: amiya_eden
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - ./.docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d amiya_eden"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - amiya-eden-network

  redis:
    image: redis:7
    container_name: amiya-eden-redis
    restart: unless-stopped
    command: redis-server --requirepass "your_redis_password"
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - ./.docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "your_redis_password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - amiya-eden-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: amiya-eden-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
    ports:
      - "65433:65432"
    volumes:
      - ./server/config/config.docker-dev.yaml:/app/config/config.yaml:ro  # copy from config.docker-dev.example.yaml
      - ./server/logs:/app/logs
      - ./server/uploads:/app/uploads
    networks:
      - amiya-eden-network

  # 本地开发用的 nginx 反向代理，将 /callback/ 转发到 /api/v1/sso/eve/callback
  # 这样不改源代码，只在本地开发时用，不影响线上
  nginx-dev:
    image: nginx:latest
    container_name: amiya-eden-nginx-dev
    restart: unless-stopped
    ports:
      - "65432:80"
    volumes:
      - ./docker-nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - amiya-eden-network

networks:
  amiya-eden-network:
    driver: bridge
