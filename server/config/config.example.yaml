server:
  port: "8080"
  mode: "debug" # debug | release | test

database:
  host: "amiya-eden-postgres"
  port: 5432
  user: "postgres"
  password: "amiya_eden_password"
  dbname: "amiya_eden"
  sslmode: "disable"
  max_idle_conns: 10
  max_open_conns: 100

log:
  level: "debug"          # debug | info | warn | error
  filename: "logs/app.log"
  max_size: 100           # 单文件最大 100MB
  max_backups: 7          # 最多保留 7 个备份
  max_age: 30             # 最多保留 30 天
  compress: true          # 压缩旧文件

jwt:
  secret: "change_me_in_production"
  expire_day: 7

redis:
  addr: "amiya-eden-redis:6379"
  password: "amiya_eden_redis_password"  # 无密码留空
  db: 0                 # 使用默认 DB
  pool_size: 10         # 连接池大小

eve_sso:
  client_id: ""          # EVE 开发者控制台申请的 Client ID
  client_secret: ""  # EVE 开发者控制台申请的 Client Secret
  callback_url: "http://localhost:8080/api/v1/sso/eve/callback"

sde:
  api_key: "change_me_sde_api_key"  # 用于保护 SDE 数据查询接口的 API Key
  proxy: ""                         # 可选代理；留空禁用。若配置了代理但连接失败，下载器会自动回退为直连
  download_url: "https://api.github.com/repos/garveen/eve-sde-converter/releases/latest"  # SDE 数据下载 URL，默认为 GitHub API 获取最新 release 信息

app:
  allow_corporations: [] # 允许访问的公司 ID 列表；留空时默认回退到伏羲军团 Fuxi Legion（98185110）

alliance_pap:
  base_url: "http://jp.newdoublex.space:25220"  # 联盟 PAP API 地址
  api_key: ""                                    # 联盟 PAP API Key
