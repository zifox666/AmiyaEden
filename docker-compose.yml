services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: amiya-eden-backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      # 挂载配置文件
      - ./server/config/config.yaml:/app/config/config.yaml:ro
      # 持久化日志
      - ./server/logs:/app/logs
      # 持久化图片
      - ./server/uploads:/app/uploads
    ports:
      - "8080:8080"
    networks:
      - amiya-eden-network

networks:
  amiya-eden-network:
    driver: bridge
