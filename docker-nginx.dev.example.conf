events {
  worker_connections 1024;
}

http {
  # 本地开发用反向代理配置
  # 将 EVE SSO 回调 /callback/ 转发到后端 API 路由 /api/v1/sso/eve/callback
  
  server {
    listen 80;
    server_name localhost;

    # 默认转发到后端
    location / {
      proxy_pass http://backend:65432;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # EVE SSO 回调路由转发（本地开发用，不影响线上）
    # EVE 开发者控制台注册的是 /callback/，但后端路由是 /api/v1/sso/eve/callback
    location = /callback/ {
      proxy_pass http://backend:65432/api/v1/sso/eve/callback$is_args$args;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /callback {
      proxy_pass http://backend:65432/api/v1/sso/eve/callback$is_args$args;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
